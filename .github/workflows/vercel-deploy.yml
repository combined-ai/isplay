name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm install -g vercel@latest

      - run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - run: |
          git config user.name "combined-ai"
          git config user.email "noreply@combined.ai"
          GIT_COMMITTER_NAME="combined-ai" GIT_COMMITTER_EMAIL="noreply@combined.ai" \
            git commit --amend --author="combined-ai <noreply@combined.ai>" --no-edit

      - run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: combined-ai
          VERCEL_GIT_COMMIT_AUTHOR_NAME: combined-ai
          VERCEL_GIT_COMMIT_AUTHOR_EMAIL: noreply@combined.ai

      - run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: combined-ai
          VERCEL_GIT_COMMIT_AUTHOR_NAME: combined-ai
          VERCEL_GIT_COMMIT_AUTHOR_EMAIL: noreply@combined.ai
